name: Auto-Generate Posts

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of posts to generate (1-3)"
        required: false
        default: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate posts
        run: node scripts/auto-generate.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          POST_COUNT: ${{ github.event.inputs.count || '1' }}

      - name: Commit new posts
        run: |
          git config user.name "AI Editor"
          git config user.email "ai@mizizinodes.vercel.app"
          git add content/posts/
          if git diff --staged --quiet; then
            echo "No new posts to commit"
          else
            git commit -m "Auto-generate blog posts [skip ci]"
            git push
          fi

      - name: Trigger Vercel redeploy
        if: success()
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
